<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园数字孪生三维交互系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* 顶部标题栏 */
        #title-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        /* 左侧控制面板 */
        #control-panel {
            position: fixed;
            left: 20px;
            top: 80px;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border-radius: 15px;
            color: white;
            z-index: 100;
            min-width: 200px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        #control-panel h3 {
            margin-bottom: 15px;
            font-size: 16px;
            color: #4ecdc4;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-section h4 {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 视角按钮 */
        .view-btn {
            width: 100%;
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(78, 205, 196, 0.2);
            border: 1px solid #4ecdc4;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .view-btn:hover {
            background: rgba(78, 205, 196, 0.4);
            transform: translateX(5px);
        }

        .view-btn.active {
            background: #4ecdc4;
            color: #1a1a2e;
            font-weight: 600;
        }

        /* 图层控制 */
        .layer-checkbox {
            display: flex;
            align-items: center;
            margin: 8px 0;
            cursor: pointer;
        }

        .layer-checkbox input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #4ecdc4;
        }

        .layer-checkbox span {
            font-size: 14px;
        }

        .layer-icon {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* 右侧信息面板 */
        #info-panel {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 320px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            display: none;
        }

        #info-panel.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        #info-header {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            padding: 20px;
            text-align: center;
        }

        #info-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        #info-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        #info-type {
            font-size: 12px;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #info-content {
            padding: 20px;
        }

        #info-description {
            font-size: 14px;
            line-height: 1.7;
            color: #ddd;
        }

        #info-stats {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #4ecdc4;
            font-weight: 600;
        }

        #close-info {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #close-info:hover {
            background: rgba(255, 100, 100, 0.6);
            transform: rotate(90deg);
        }

        /* 底部信息栏 */
        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 25px;
            border-radius: 20px;
            color: #aaa;
            font-size: 13px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        #status-bar span {
            color: #4ecdc4;
        }

        /* 加载提示 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(78, 205, 196, 0.2);
            border-top-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-text {
            margin-top: 20px;
            color: white;
            font-size: 16px;
        }

        /* 高亮样式 */
        .highlighted {
            outline: 2px solid #4ecdc4;
        }
    </style>
</head>
<body>
    <!-- 加载界面 -->
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">正在加载校园场景...</div>
    </div>

    <!-- 标题栏 -->
    <div id="title-bar">校园数字孪生系统</div>

    <!-- 左侧控制面板 -->
    <div id="control-panel">
        <h3>🎮 控制面板</h3>

        <div class="control-section">
            <h4>📷 视角切换</h4>
            <button class="view-btn active" id="btn-perspective">透视视角</button>
            <button class="view-btn" id="btn-birdview">鸟瞰视角</button>
        </div>

        <div class="control-section">
            <h4>📑 图层控制</h4>
            <label class="layer-checkbox">
                <input type="checkbox" id="layer-buildings" checked>
                <span class="layer-icon">🏢</span>
                <span>建筑组</span>
            </label>
            <label class="layer-checkbox">
                <input type="checkbox" id="layer-roads" checked>
                <span class="layer-icon">🛤️</span>
                <span>道路组</span>
            </label>
            <label class="layer-checkbox">
                <input type="checkbox" id="layer-vegetation" checked>
                <span class="layer-icon">🌳</span>
                <span>植被组</span>
            </label>
        </div>
    </div>

    <!-- 右侧信息面板 -->
    <div id="info-panel">
        <button id="close-info">✕</button>
        <div id="info-header">
            <div id="info-icon">🏛️</div>
            <div id="info-title">教学楼A</div>
            <div id="info-type">教学楼</div>
        </div>
        <div id="info-content">
            <p id="info-description">这是校园主要的教学楼，用于日常授课和学术交流活动。</p>
            <div id="info-stats">
                <div class="stat-item">
                    <span class="stat-label">楼层数</span>
                    <span class="stat-value" id="stat-floors">5层</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">建筑面积</span>
                    <span class="stat-value" id="stat-area">12,000㎡</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">建造年份</span>
                    <span class="stat-value" id="stat-year">2015</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态栏 -->
    <div id="status-bar">
        <span>左键旋转</span> | <span>滚轮缩放</span> | <span>右键平移</span> | <span>点击对象查看详情</span>
    </div>

    <!-- 画布容器 -->
    <div id="canvas-container"></div>

    <!-- Three.js库 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // =====================================================
        // 校园数字孪生三维交互系统
        // =====================================================

        // 全局变量
        let scene, camera, renderer, controls;
        let raycaster, mouse;
        let buildingGroup, roadGroup, vegetationGroup;
        let selectedObject = null;
        let animationId;
        let movingBus = null;
        let busPath = [];
        let busProgress = 0;

        // 对象信息数据库
        const objectInfoDB = {
            'teaching_building_a': {
                icon: '🏢',
                title: '教学楼A',
                type: '教学楼',
                description: '校园主要的教学楼，包含50余间标准教室，配备现代化多媒体教学设备，是日常授课和学术交流的主要场所。',
                stats: { floors: '5层', area: '12,000㎡', year: '2015' }
            },
            'library': {
                icon: '📚',
                title: '图书馆',
                type: '图书馆',
                description: '校园知识中心，藏书超过80万册，设有自习区、电子阅览室和学术报告厅，是学生学习和研究的重要基地。',
                stats: { floors: '4层', area: '15,000㎡', year: '2012' }
            },
            'canteen': {
                icon: '🍽️',
                title: '学生食堂',
                type: '食堂',
                description: '可容纳3000人同时用餐，采用智能化点餐系统，提供丰富多样的美食选择，是校园社交的重要场所。',
                stats: { floors: '3层', area: '8,000㎡', year: '2010' }
            },
            'dormitory_a': {
                icon: '🏠',
                title: '学生宿舍A区',
                type: '宿舍',
                description: '标准的四人间宿舍，配备空调、热水器和高速网络，为学生提供舒适的居住环境。',
                stats: { floors: '6层', area: '10,000㎡', year: '2016' }
            },
            'sports_hall': {
                icon: '🏟️',
                title: '体育馆',
                type: '体育设施',
                description: '室内综合体育场馆，设有篮球场、羽毛球场、游泳池和健身中心，是校园体育活动的中心。',
                stats: { floors: '2层', area: '6,000㎡', year: '2018' }
            },
            'clock_tower': {
                icon: '🕰️',
                title: '钟楼',
                type: '标志性建筑',
                description: '校园标志性建筑，高45米，每逢整点报时，是校园景观和历史文化的象征。',
                stats: { floors: '9层', area: '500㎡', year: '2008' }
            },
            '路灯_1': {
                icon: '💡',
                title: '路灯',
                type: '照明设施',
                description: '校园照明设施，采用LED节能灯源，智能感应控制，夜间为校园提供充足照明。',
                stats: { height: '5米', type: 'LED' }
            },
            '长椅_1': {
                icon: '🪑',
                title: '休闲长椅',
                type: '休闲设施',
                description: '校园休闲设施，采用防腐木和钢材结合设计，为师生提供休息交流的场所。',
                stats: { length: '2米', material: '防腐木' }
            },
            'bus_stop': {
                icon: '🚌',
                title: '校园巴士站',
                type: '交通设施',
                description: '校园公共交通站点，校园巴士每15分钟一班，连接校园各主要区域。',
                stats: { capacity: '20人', interval: '15分钟' }
            },
            'tree_1': {
                icon: '🌲',
                title: '银杏树',
                type: '植被',
                description: '校园主要景观树，秋季金黄落叶形成美丽的校园风景线，树龄约50年。',
                stats: { height: '8米', age: '50年' }
            },
            'bush_1': {
                icon: '🌿',
                title: '灌木丛',
                type: '植被',
                description: '校园绿化景观，采用四季常绿灌木，起到美化环境和隔离空间的作用。',
                stats: { height: '1米', type: '常绿灌木' }
            },
            'sculpture': {
                icon: '🗿',
                title: '思想者雕塑',
                type: '雕塑',
                description: '校园文化象征，仿罗丹《思想者》雕塑，寓意学术思考与探索精神。',
                stats: { height: '3米', material: '青铜' }
            }
        };

        // =====================================================
        // 初始化场景
        // =====================================================
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 创建相机
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(30, 20, 30);
            camera.lookAt(0, 0, 0);

            // 创建轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 100;

            // 创建光线追踪器
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 创建组
            buildingGroup = new THREE.Group();
            roadGroup = new THREE.Group();
            vegetationGroup = new THREE.Group();
            scene.add(buildingGroup);
            scene.add(roadGroup);
            scene.add(vegetationGroup);

            // 设置光照
            setupLights();

            // 创建地面
            createGround();

            // 创建建筑
            createBuildings();

            // 创建道路
            createRoads();

            // 创建植被
            createVegetation();

            // 创建辅助设施
            createFacilities();

            // 加载外部模型
            loadExternalModel();

            // 创建移动巴士
            createMovingBus();

            // 创建动画循环
            animate();

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onMouseClick);

            // UI事件绑定
            setupUI();

            // 隐藏加载界面
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
        }

        // =====================================================
        // 光照系统
        // =====================================================
        function setupLights() {
            // 环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            // 主定向光（模拟日光）
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(50, 80, 30);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 200;
            sunLight.shadow.camera.left = -60;
            sunLight.shadow.camera.right = 60;
            sunLight.shadow.camera.top = 60;
            sunLight.shadow.camera.bottom = -60;
            sunLight.shadow.bias = -0.0001;
            scene.add(sunLight);

            // 补光
            const fillLight = new THREE.DirectionalLight(0x88ccff, 0.3);
            fillLight.position.set(-30, 40, -20);
            scene.add(fillLight);

            // 半球光
            const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x3d5c5c, 0.3);
            scene.add(hemiLight);
        }

        // =====================================================
        // 创建地面
        // =====================================================
        function createGround() {
            // 主地面
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x7cb342,
                roughness: 0.8,
                metalness: 0.1
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // 网格辅助线
            const gridHelper = new THREE.GridHelper(200, 40, 0x555555, 0x444444);
            gridHelper.position.y = 0.01;
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
        }

        // =====================================================
        // 创建建筑
        // =====================================================
        function createBuildings() {
            // 教学楼A - 主建筑
            createTeachingBuilding(
                -15, 0, -10,
                { width: 12, height: 15, depth: 8 },
                'teaching_building_a',
                0x4a90d9,
                '主教学楼，蓝色玻璃幕墙'
            );

            // 图书馆 - 现代风格
            createLibrary(
                15, 0, -5,
                { width: 15, height: 12, depth: 10 },
                'library',
                0x8B4513,
                '红砖外墙，古典风格'
            );

            // 学生食堂
            createCanteen(
                0, 0, 15,
                { width: 14, height: 8, depth: 10 },
                'canteen',
                0xd4a574,
                '浅黄色外墙，现代设计'
            );

            // 学生宿舍A区
            createDormitory(
                -20, 0, 15,
                { width: 10, height: 18, depth: 8 },
                'dormitory_a',
                0xc9b896,
                '米白色外墙，标准六层'
            );

            // 体育馆
            createSportsHall(
                20, 0, 15,
                { width: 20, height: 10, depth: 15 },
                'sports_hall',
                0x9e9e9e,
                '银灰色金属幕墙'
            );

            // 钟楼（标志性建筑）
            createClockTower(
                0, 0, -20,
                { radius: 2, height: 25 },
                'clock_tower',
                0xe8dcc4,
                '校园标志性建筑'
            );
        }

        function createTeachingBuilding(x, y, z, size, id, color, description) {
            const group = new THREE.Group();

            // 主楼体
            const mainGeo = new THREE.BoxGeometry(size.width, size.height, size.depth);
            const mainMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.5,
                metalness: 0.3
            });
            const mainBuilding = new THREE.Mesh(mainGeo, mainMat);
            mainBuilding.position.y = size.height / 2;
            mainBuilding.castShadow = true;
            mainBuilding.receiveShadow = true;
            group.add(mainBuilding);

            // 窗户装饰
            const windowMat = new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                roughness: 0.2,
                metalness: 0.8
            });
            for (let i = 0; i < 4; i++) {
                const windowGeo = new THREE.BoxGeometry(1.5, 1.2, 0.1);
                const window = new THREE.Mesh(windowGeo, windowMat);
                window.position.set(-4 + i * 2.5, 5, size.depth / 2 + 0.05);
                group.add(window);

                const window2 = window.clone();
                window2.position.z = -size.depth / 2 - 0.05;
                group.add(window2);
            }

            // 屋顶装饰
            const roofGeo = new THREE.BoxGeometry(size.width + 0.5, 0.5, size.depth + 0.5);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.position.y = size.height + 0.25;
            group.add(roof);

            // 入口台阶
            const stepsGeo = new THREE.BoxGeometry(4, 0.3, 2);
            const stepsMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
            const steps = new THREE.Mesh(stepsGeo, stepsMat);
            steps.position.set(0, 0.15, size.depth / 2 + 1);
            group.add(steps);

            group.position.set(x, y, z);
            group.userData = { id: id, type: 'building', description: description };
            buildingGroup.add(group);
        }

        function createLibrary(x, y, z, size, id, color, description) {
            const group = new THREE.Group();

            // 主楼体 - 采用分层设计
            for (let i = 0; i < 4; i++) {
                const floorGeo = new THREE.BoxGeometry(
                    size.width - i * 1,
                    3,

        function createSportsHall(x, y, z, size, id, color, description) {
            const group = new THREE.Group();

            // 主体建筑 - 波浪屋顶
            const curvePoints = [];
            for (let i = 0; i <= 20; i++) {
                const xPos = (i / 20 - 0.5) * size.width;
                const yPos = Math.sin(i / 20 * Math.PI) * 3;
                curvePoints.push(new THREE.Vector3(xPos, yPos, 0));
            }

            const shape = new THREE.Shape();
            shape.moveTo(-size.width / 2, 0);
            curvePoints.forEach(p => shape.lineTo(p.x, p.y));
            shape.lineTo(size.width / 2, 0);
            shape.lineTo(-size.width / 2, 0);

            const extrudeSettings = {
                steps: 1,
                depth: size.depth,
                bevelEnabled: false
            };

            const roofGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            const roofMat = new THREE.MeshStandardMaterial({
                color: color,
                roughness: 0.4,
                metalness: 0.6
            });
            const roof = new THREE.Mesh(roofGeo, roofMat);
            roof.rotation.x = -Math.PI / 2;
            roof.position.z = -size.depth / 2;
            roof.castShadow = true;
            group.add(roof);

            // 底部墙体
            const wallGeo = new THREE.BoxGeometry(size.width, size.height, size.depth);
            const wallMat = new THREE.MeshStandardMaterial({
                color: 0xeeeeee,
                roughness: 0.7
            });
            const walls = new THREE.Mesh(wallGeo, wallMat);
            walls.position.y = size.height / 2;
            walls.receiveShadow = true;
            group.add(walls);

            // 入口大门
            const doorGeo = new THREE.BoxGeometry(8, 5, 0.5);
            const doorMat = new THREE.MeshStandardMaterial({ color: 0x263238 });
            const door = new THREE.Mesh(doorGeo, doorMat);
            door.position.set(0, 2.5, size.depth / 2 + 0.25);
            group.add(door);

            group.position.set(x, y, z);
            group.userData = { id: id, type: 'building', description: description };
            buildingGroup.add(group);
        }

        function createRoad(x, y, z, length, width, rotation, name) {
            const roadGeo = new THREE.PlaneGeometry(length, width);
            const roadMat = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.9
            });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(x, y, z);
            road.rotation.z = rotation;
            road.receiveShadow = true;
            road.userData = { id: name, type: 'road' };
            roadGroup.add(road);

            // 路沿石
            const curbGeo = new THREE.BoxGeometry(length, 0.15, 0.2);
            const curbMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const curb1 = new THREE.Mesh(curbGeo, curbMat);
            curb1.position.set(x, y + 0.1, z + width / 2 + 0.1);
            curb1.rotation.z = rotation;
            roadGroup.add(curb1);

            const curb2 = new THREE.Mesh(curbGeo, curbMat);
            curb2.position.set(x, y + 0.1, z - width / 2 - 0.1);
            curb2.rotation.z = rotation;
            roadGroup.add(curb2);

            // 道路标线
            const lineGeo = new THREE.PlaneGeometry(length, 0.15);
            const lineMat = new THREE.MeshStandardMaterial({
                color: 0xffcc00,
                emissive: 0xffcc00,
                emissiveIntensity: 0.1
            });
            const centerLine = new THREE.Mesh(lineGeo, lineMat);
            centerLine.rotation.x = -Math.PI / 2;
            centerLine.position.set(x, y + 0.01, z);
            centerLine.rotation.z = rotation;
            roadGroup.add(centerLine);
        }

        function createCircularRoad(x, y, z, radius, width) {
            const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, 2 * Math.PI, false, 0);
            const points = curve.getPoints(60);
            const closedCurve = new THREE.CatmullRomCurve3(
                points.map(p => new THREE.Vector3(p.x, 0, p.y)),
                true
            );

            const tubeGeo = new THREE.TubeGeometry(closedCurve, 60, width / 2, 8, true);
            const tubeMat = new THREE.MeshStandardMaterial({
                color: 0x333333,
                roughness: 0.9
            });
            const road = new THREE.Mesh(tubeGeo, tubeMat);
            road.position.set(x, y, z);
            road.rotation.x = -Math.PI / 2;
            road.receiveShadow = true;
            road.userData = { id: '环校园道路', type: 'road' };
            roadGroup.add(road);

            // 内侧路沿
            const innerCurb = new THREE.TorusGeometry(radius, 0.1, 8, 60);
            const curbMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
            const innerCurbMesh = new THREE.Mesh(innerCurb, curbMat);
            innerCurbMesh.rotation.x = -Math.PI / 2;
            innerCurbMesh.position.set(x, y + 0.1, z);
            roadGroup.add(innerCurbMesh);

            // 外侧路沿
            const outerCurb = new THREE.TorusGeometry(radius + width, 0.1, 8, 60);
            const outerCurbMesh = new THREE.Mesh(outerCurb, curbMat);
            outerCurbMesh.rotation.x = -Math.PI / 2;
            outerCurbMesh.position.set(x, y + 0.1, z);
            roadGroup.add(outerCurbMesh);
        }

        // =====================================================
        // 加载外部模型（GLTF/GLB）
        // =====================================================
        function loadExternalModel() {
            const loader = new THREE.GLTFLoader();

            // =====================================================
            // 用户替换指引：
            // 若要加载实际模型，请将以下URL替换为您的GLB/GLTF文件路径
            // 可使用腾讯混元3D(https://3d.tencent.com/)等工具生成的模型
            //
            // 示例:
            // loader.load('models/campus_sculpture.glb', onModelLoaded, onProgress, onError);
            // =====================================================

            const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb';

            loader.load(
                modelUrl,
                function(gltf) {
                    // 模型加载成功
                    const model = gltf.scene;

                    // 调整模型位置和大小
                    model.position.set(8, 0, 8);
                    model.scale.set(0.05, 0.05, 0.05);
                    model.rotation.y = Math.PI;

                    // 设置材质和阴影
                    model.traverse(function(child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    model.userData = { id: 'external_model', type: 'sculpture' };
                    buildingGroup.add(model);

                    console.log('外部模型加载成功');
                },
                function(progress) {
                    console.log('模型加载进度:', (progress.loaded / progress.total * 100) + '%');
                },
                function(error) {
                    console.warn('外部模型加载失败，使用备用几何体');

                    // 备用几何体 - 鸭子形状的简化版
                    const fallbackGroup = new THREE.Group();

                    const bodyGeo = new THREE.SphereGeometry(1, 16, 16);
                    const bodyMat = new THREE.MeshStandardMaterial({
                        color: 0xf4d03f,
                        roughness: 0.6
                    });
                    const body = new THREE.Mesh(bodyGeo, bodyMat);
                    body.position.y = 1;
                    body.castShadow = true;
                    fallbackGroup.add(body);

                    const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
                    const head = new THREE.Mesh(headGeo, bodyMat);
                    head.position.set(0.8, 1.8, 0);
                    head.castShadow = true;
                    fallbackGroup.add(head);

                    const beakGeo = new THREE.ConeGeometry(0.2, 0.5, 8);
                    const beakMat = new THREE.MeshStandardMaterial({ color: 0xff8c00 });
                    const beak = new THREE.Mesh(beakGeo, beakMat);
                    beak.position.set(1.3, 1.8, 0);
                    beak.rotation.z = -Math.PI / 2;
                    fallbackGroup.add(beak);

                    fallbackGroup.position.set(8, 0, 8);
                    fallbackGroup.userData = { id: 'duck_fallback', type: 'sculpture' };
                    buildingGroup.add(fallbackGroup);
                }
            );
        }

        // =====================================================
        // 创建移动巴士
        // =====================================================
        function createMovingBus() {
            const busGroup = new THREE.Group();

            // 车身
            const bodyGeo = new THREE.BoxGeometry(2.5, 1.2, 1.2);
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x3498db,
                roughness: 0.4,
                metalness: 0.6
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.8;
            body.castShadow = true;
            busGroup.add(body);

            // 车顶
            const roofGeo = new THREE.BoxGeometry(2.2, 0.3, 1.1);
            const roof = new THREE.Mesh(roofGeo, bodyMat);
            roof.position.y = 1.55;
            roof.castShadow = true;
            busGroup.add(roof);

            // 窗户
            const windowMat = new THREE.MeshStandardMaterial({
                color: 0x85c1e9,
                roughness: 0.1,
                metalness: 0.8
            });
            for (let i = -1; i <= 1; i++) {
                const windowGeo = new THREE.BoxGeometry(0.4, 0.4, 0.05);
                const window = new THREE.Mesh(windowGeo, windowMat);
                window.position.set(i * 0.7, 1, 0.62);
                busGroup.add(window);
            }

            // 车轮
            const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x333333 });

            const positions = [
                { x: -0.8, z: 0.65 }, { x: 0.8, z: 0.65 },
                { x: -0.8, z: -0.65 }, { x: 0.8, z: -0.65 }
            ];

            positions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(pos.x, 0.25, pos.z);
                wheel.rotation.x = Math.PI / 2;
                wheel.castShadow = true;
                busGroup.add(wheel);
            });

            // 前后标记
            const frontGeo = new THREE.BoxGeometry(0.3, 0.3, 0.05);
            const frontMat = new THREE.MeshStandardMaterial({
                color: 0xf1c40f,
                emissive: 0xf1c40f,
                emissiveIntensity: 0.3
            });
            const front = new THREE.Mesh(frontGeo, frontMat);
            front.position.set(0, 0.7, 0.63);
            busGroup.add(front);

            // 创建路径点
            busPath = [
                new THREE.Vector3(-25, 0, 5),
                new THREE.Vector3(-15, 0, 5),
                new THREE.Vector3(-5, 0, 5),
                new THREE.Vector3(5, 0, 5),
                new THREE.Vector3(15, 0, 5),
                new THREE.Vector3(25, 0, 5),
                new THREE.Vector3(25, 0, -5),
                new THREE.Vector3(25, 0, -15),
                new THREE.Vector3(20, 0, -15),
                new THREE.Vector3(10, 0, -15),
                new THREE.Vector3(0, 0, -15),
                new THREE.Vector3(-10, 0, -15),
                new THREE.Vector3(-20, 0, -15),
                new THREE.Vector3(-25, 0, -15),
                new THREE.Vector3(-25, 0, -5)
            ];

            busGroup.position.set(-25, 0, 5);
            busGroup.userData = { id: 'campus_bus', type: 'vehicle' };
            scene.add(busGroup);
            movingBus = busGroup;
        }

        // =====================================================
        // 鼠标点击处理
        // =====================================================
        function onMouseClick(event) {
            // 计算鼠标位置
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            // 设置射线
            raycaster.setFromCamera(mouse, camera);

            // 获取所有可点击对象
            const clickableObjects = [];
            buildingGroup.traverse(obj => {
                if (obj.isMesh) {
                    clickableObjects.push(obj);
                }
            });
            vegetationGroup.traverse(obj => {
                if (obj.isMesh) {
                    clickableObjects.push(obj);
                }
            });

            // 检测交叉
            const intersects = raycaster.intersectObjects(clickableObjects, true);

            if (intersects.length > 0) {
                // 找到点击的对象
                let targetObj = intersects[0].object;

                // 查找父级组
                while (targetObj.parent && !targetObj.userData.id) {
                    targetObj = targetObj.parent;
                }

                // 高亮显示
                highlightObject(targetObj);

                // 显示信息面板
                showInfoPanel(targetObj.userData.id || targetObj.parent?.userData?.id);
            }
        }

        function highlightObject(obj) {
            // 清除之前的高亮
            if (selectedObject) {
                // 重置之前选中的对象
            }

            selectedObject = obj;

            // 添加高亮效果
            obj.traverse(child => {
                if (child.isMesh && child.material) {
                    child.material.emissive = new THREE.Color(0x4ecdc4);
                    child.material.emissiveIntensity = 0.3;
                }
            });
        }

        function clearHighlight() {
            if (selectedObject) {
                selectedObject.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive = new THREE.Color(0x000000);
                        child.material.emissiveIntensity = 0;
                    }
                });
                selectedObject = null;
            }
        }

        // =====================================================
        // 信息面板
        // =====================================================
        function showInfoPanel(id) {
            const info = objectInfoDB[id];
            if (!info) {
                // 通用信息
                showGenericInfo(id);
                return;
            }

            document.getElementById('info-icon').textContent = info.icon;
            document.getElementById('info-title').textContent = info.title;
            document.getElementById('info-type').textContent = info.type;
            document.getElementById('info-description').textContent = info.description;

            // 更新统计信息
            const statsDiv = document.getElementById('info-stats');
            statsDiv.innerHTML = '';

            for (const [key, value] of Object.entries(info.stats)) {
                const statItem = document.createElement('div');
                statItem.className = 'stat-item';
                statItem.innerHTML = `
                    <span class="stat-label">${{
                        floors: '楼层数',
                        area: '建筑面积',
                        year: '建造年份',
                        height: '高度',
                        type: '类型',
                        material: '材质',
                        length: '长度',
                        age: '树龄',
                        capacity: '容量',
                        interval: '班次间隔'
                    }[key] || key}</span>
                    <span class="stat-value">${value}</span>
                `;
                statsDiv.appendChild(statItem);
            }

            document.getElementById('info-panel').classList.add('show');
        }

        function showGenericInfo(id) {
            const type = id.split('_')[0];
            const typeNames = {
                'tree': '树木',
                'bush': '灌木',
                '路灯': '路灯',
                '长椅': '长椅'
            };

            document.getElementById('info-icon').textContent = '🌿';
            document.getElementById('info-title').textContent = id;
            document.getElementById('info-type').textContent = typeNames[type] || '校园设施';
            document.getElementById('info-description').textContent = '校园环境的重要组成部分，为师生提供舒适的学习和生活环境。';

            const statsDiv = document.getElementById('info-stats');
            statsDiv.innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">状态</span>
                    <span class="stat-value">正常</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">位置</span>
                    <span class="stat-value">校园区域</span>
                </div>
            `;

            document.getElementById('info-panel').classList.add('show');
        }

        // =====================================================
        // UI事件设置
        // =====================================================
        function setupUI() {
            // 视角切换按钮
            document.getElementById('btn-perspective').addEventListener('click', () => {
                setPerspectiveView();
                updateViewButtons('perspective');
            });

            document.getElementById('btn-birdview').addEventListener('click', () => {
                setBirdView();
                updateViewButtons('birdview');
            });

            // 图层控制
            document.getElementById('layer-buildings').addEventListener('change', (e) => {
                buildingGroup.visible = e.target.checked;
            });

            document.getElementById('layer-roads').addEventListener('change', (e) => {
                roadGroup.visible = e.target.checked;
            });

            document.getElementById('layer-vegetation').addEventListener('change', (e) => {
                vegetationGroup.visible = e.target.checked;
            });

            // 关闭信息面板
            document.getElementById('close-info').addEventListener('click', () => {
                document.getElementById('info-panel').classList.remove('show');
                clearHighlight();
            });
        }

        function setPerspectiveView() {
            // 透视视角 - 相机位于斜上方
            gsapTo(camera.position, { x: 30, y: 20, z: 30 });
            gsapTo(controls.target, { x: 0, y: 0, z: 0 });
        }

        function setBirdView() {
            // 鸟瞰视角 - 相机位于正上方
            gsapTo(camera.position, { x: 0, y: 60, z: 0.1 });
            gsapTo(controls.target, { x: 0, y: 0, z: 0 });
        }

        function gsapTo(obj, props) {
            // 简单的动画过渡
            const startValues = {};
            const endValues = {};
            const duration = 800;
            const startTime = Date.now();

            for (const key in props) {
                startValues[key] = obj[key];
                endValues[key] = props[key];
            }

            function update() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                for (const key in endValues) {
                    obj[key] = startValues[key] + (endValues[key] - startValues[key]) * ease;
                }

                if (t < 1) {
                    requestAnimationFrame(update);
                }
            }

            update();
        }

        function updateViewButtons(active) {
            document.getElementById('btn-perspective').classList.toggle('active', active === 'perspective');
            document.getElementById('btn-birdview').classList.toggle('active', active === 'birdview');
        }

        // =====================================================
        // 窗口大小调整
        // =====================================================
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // =====================================================
        // 动画循环
        // =====================================================
        function animate() {
            animationId = requestAnimationFrame(animate);

            // 更新控制器
            controls.update();

            // 移动巴士动画
            if (movingBus && busPath.length > 0) {
                updateBusPosition();
            }

            // 渲染场景
            renderer.render(scene, camera);
        }

        function updateBusPosition() {
            const speed = 0.003;
            busProgress += speed;

            if (busProgress >= 1) {
                busProgress = 0;
            }

            // 计算当前路径段
            const pathIndex = Math.floor(busProgress * busPath.length);
            const nextIndex = (pathIndex + 1) % busPath.length;
            const segmentProgress = (busProgress * busPath.length) % 1;

            // 位置插值
            const currentPos = busPath[pathIndex].clone();
            const nextPos = busPath[nextIndex].clone();
            movingBus.position.lerpVectors(currentPos, nextPos, segmentProgress);

            // 计算朝向
            const direction = nextPos.clone().sub(currentPos).normalize();
            if (direction.length() > 0.01) {
                const angle = Math.atan2(direction.x, direction.z);
                movingBus.rotation.y = angle;
            }
        }

        // =====================================================
        // 启动
        // =====================================================
        init();
    </script>
